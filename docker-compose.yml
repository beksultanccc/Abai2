services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bilimspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: super-secret-key-change-me
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bilimspace?schema=public
      CLIENT_URLS: http://localhost:8080,http://localhost:5173
      UPLOAD_DIR: /app/src/uploads
    depends_on:
      - postgres
    volumes:
      - ./backend/src/uploads:/app/src/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_UPLOADS_URL: http://localhost:5000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
